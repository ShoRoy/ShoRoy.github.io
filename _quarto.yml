project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "projects/*.qmd"
  resources:
    - "assets/Shobhan_Roy_Resume.pdf"
    - "assets/og-card.png"
    - "assets/favicon.png"
    - "assets/favicon-32.png"
    - "assets/frame-impact.png"
    - "assets/dparc-hotspot-emulation.png"
    - "assets/roy-fig9-temperature-vm-strain.png"
    - "assets/heds-microstructure-ensemble.png"
    - "assets/heds-shock-temperature.png"
    - "assets/shock-pore-collapse.mp4"

website:
  title: "Shobhan Roy"
  site-url: "https://www.shobhanroy.com"
  description: "Computational physicist and SciML researcher working on multi-physics modeling and physics-aware AI."
  image: assets/og-card.png
  favicon: assets/favicon.png
  navbar:
    pinned: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Projects"
        href: projects/index.qmd
      - text: "Research"
        href: research.qmd
      - text: "Publications"
        href: publications.qmd
      - text: "Resume"
        href: cv.qmd
      - text: "Contact"
        href: contact.qmd
    right:
      - icon: linkedin
        href: https://www.linkedin.com/in/shobhan-roy
        aria-label: LinkedIn
      - text: "Resume (PDF)"
        href: assets/Shobhan_Roy_Resume.pdf
  page-footer:
    left: "Copyright 2026 Shobhan Roy"
    right: "Built with Quarto &middot; AI-assisted (Copilot + VS Code agents)"
  open-graph: true
  twitter-card: true
  search: false

format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    smooth-scroll: true
    page-layout: full
    link-external-newwindow: true

execute:
  freeze: auto
