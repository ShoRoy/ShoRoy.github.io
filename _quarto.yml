project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "projects/*.qmd"
  resources:
    - "robots.txt"
    - "assets/Resume.pdf"
    - "assets/og-card.png"
    - "assets/favicon.png"
    - "assets/favicon-32.png"
    - "assets/dparc-fig5-architecture.jpg"
    - "assets/dparc-fig2-kernel-adaptation.jpg"
    - "assets/3MT_poster.jpg"
    - "assets/heds-microstructure-ensemble.png"
    - "assets/heds-shock-temperature.png"
    - "assets/Highres_crystal.jpg"
    - "assets/DNS_PBX.mp4"
    - "assets/shock-pore-collapse.mp4"

website:
  title: "Computational physicist and SciML researcher · IIHR"
  site-url: "https://www.shobhanroy.com"
  description: "Computational physicist and SciML researcher working on multi-physics modeling and physics-aware AI."
  image: assets/og-card.png
  favicon: assets/favicon.png
  navbar:
    title: "SR"
    pinned: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Projects"
        href: projects/index.qmd
      - text: "Research"
        href: research.qmd
      - text: "Publications"
        href: publications.qmd
      - text: "Resume"
        href: cv.qmd
      - text: "Contact"
        href: contact.qmd
    right:
      - icon: linkedin
        href: https://www.linkedin.com/in/shobhan-roy
        aria-label: LinkedIn
      - text: "Resume (PDF)"
        href: assets/Resume.pdf
  page-footer:
    left: "Copyright 2026 S Roy"
    right: "Built with Quarto &middot; AI-assisted (Copilot + VS Code agents)"
  open-graph: false
  twitter-card: false
  search: false

format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    smooth-scroll: true
    page-layout: full
    link-external-newwindow: true
    include-in-header:
      - text: |
          <meta name="robots" content="noindex, nofollow">
          <meta name="googlebot" content="noindex, nofollow">

execute:
  freeze: auto
